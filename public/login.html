<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<title>Forge — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808;--s1:#101010;--s2:#181818;--s3:#222;
  --border:#2a2a2a;--border2:#363636;
  --lime:#c8ff00;--red:#ff3b3b;
  --text:#f2f2f2;--text2:#888;--text3:#484848;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Archivo',sans-serif;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:calc(var(--safe-top)+24px);padding-bottom:calc(var(--safe-bottom)+24px);}
.wordmark{font-family:'Archivo Black',sans-serif;font-size:56px;color:var(--lime);letter-spacing:-3px;margin-bottom:40px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.tabs{display:flex;gap:0;margin-bottom:24px;background:var(--s2);border-radius:10px;padding:3px;}
.tab{flex:1;background:none;border:none;color:var(--text3);font-family:'Archivo',sans-serif;font-size:14px;font-weight:700;padding:10px;border-radius:8px;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--lime);color:#000;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Archivo',sans-serif;font-size:15px;padding:13px 15px;outline:none;margin-bottom:10px;}
.inp:focus{border-color:var(--lime);}
.inp::placeholder{color:var(--text3);}
.btn{width:100%;background:var(--lime);color:#000;border:none;border-radius:10px;font-family:'Archivo Black',sans-serif;font-size:16px;padding:14px;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.error{color:var(--red);font-size:12px;font-weight:600;text-align:center;min-height:18px;margin-top:10px;}
.pwd-wrap{position:relative;}
.pwd-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:6px;line-height:1;opacity:.55;}
.pwd-toggle:hover{opacity:1;}
.pwd-wrap .inp{padding-right:42px;margin-bottom:10px;}
.hint{font-size:11px;color:var(--text3);margin:-4px 0 10px 4px;}
.inp:-webkit-autofill,
.inp:-webkit-autofill:hover,
.inp:-webkit-autofill:focus,
.inp:-webkit-autofill:active {
  -webkit-box-shadow: 0 0 0 1000px var(--s2) inset !important;
  -webkit-text-fill-color: var(--text) !important;
  caret-color: var(--text) !important;
  border-color: var(--border2) !important;
  transition: background-color 9999s ease-in-out 0s !important;
}
</style>
</head>
<body>
  <div class="wordmark">FORGE</div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <form id="auth-form" onsubmit="handleSubmit(event)">
      <input class="inp" id="email" type="email" placeholder="Email" autocomplete="email" required>
      <div class="pwd-wrap">
        <input class="inp" id="password" type="password" placeholder="Password" autocomplete="current-password" required minlength="8">
        <button type="button" class="pwd-toggle" onclick="togglePwd('password')" aria-label="Show password">👁</button>
      </div>
      <div class="pwd-wrap" id="confirm-wrap" style="display:none;">
        <input class="inp" id="confirm" type="password" placeholder="Confirm password" autocomplete="new-password" minlength="8">
        <button type="button" class="pwd-toggle" onclick="togglePwd('confirm')" aria-label="Show password">👁</button>
      </div>
      <div class="hint" id="hint" style="display:none;">Min 8 characters</div>
      <button class="btn" type="submit" id="submit-btn">LOG IN</button>
    </form>
    <div class="error" id="error"></div>
  </div>
  <script src="/login.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
